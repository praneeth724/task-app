name: CD

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy backend + frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy hook (backend)
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set, skipping backend deploy."
          else
            curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          fi

      - name: Trigger Vercel deploy hook (frontend)
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not set, skipping frontend deploy."
          else
            curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          fi
