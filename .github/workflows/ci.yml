name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: task_tracker_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: mysql://root:root@localhost:3306/task_tracker_test
      DATABASE_URL: mysql://root:root@localhost:3306/task_tracker_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace apps/backend

      - name: Lint
        run: npm run lint --workspace apps/backend

      - name: Run database migrations
        run: npm run prisma:deploy --workspace apps/backend

      - name: Run tests
        run: npm run test --workspace apps/backend

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace apps/frontend

      - name: Run tests
        run: npm run test --workspace apps/frontend
